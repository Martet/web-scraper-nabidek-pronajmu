<!DOCTYPE html>
<html>
<head>

<link id="favicon" rel="icon" type="image/x-icon" href="https://cdn.betterttv.net/emote/652a9c2ea1072c9ec8e3ef65/2x.webp">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>

<style>
    body {
        font-family: sans-serif;
        max-width: 800px;
        margin: auto;
    }

    .offer {
        border: 1px solid #ccc;
        border-radius: 10px;
        margin: 15px;
        max-height: 250px;
        display: flex;
        justify-content: space-between;
        transition: transform 0.2s;
    }

    .offer img {
        max-width: 300px;
        height: auto;
        border-radius: inherit;
    }

    .offer:hover {
        transform: scale(1.01);
    }

    #offers a {
        text-decoration: none;
        color: inherit;
    }

    #new-divider {
        margin: 15px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #bd2150;
        font-weight: 500;
        font-size: 0.9em;
    }

    #new-divider::before, #new-divider::after {
        content: "";
        flex: 1;
        border-bottom: 3px dashed #bd2150;
    }

    #scroll-loader {
        height: 1px;
    }
</style>

</head>

<body>

<div id="offers">

{% for offer in offers %}
{% include "offer.html" %}
{% endfor %}

</div>

<div
    id="scroll-loader"
    hx-get="/offers?before={{offers[-1].link|urlencode}}"
    hx-trigger="intersect"
    hx-target="#offers"
    hx-swap="beforeend">
</div>

<script>
    const ws = new WebSocket(`ws://${location.host}/ws`);
    const offers = document.getElementById("offers");
    let updateTimestamp = Date.now();
    
    ws.onmessage = (event) => {
        if (Date.now() - updateTimestamp > 1000) {
            updateTimestamp = Date.now();
            document.getElementById("new-divider")?.remove();
            offers.insertAdjacentHTML(
                "afterbegin", 
                `<div id="new-divider">${new Date().toLocaleTimeString([], { hour12: false })}</div>`
            );
        }
        offers.insertAdjacentHTML("afterbegin", event.data);
    }

    document.body.addEventListener("htmx:afterSwap", (evt) => {
        if (evt.target.id !== "offers")
            return;
        const offers = document.querySelectorAll(".offer");
        if (offers.length === 0)
            return;
        const last = offers[offers.length - 1];
        const loader = document.getElementById("scroll-loader");
        loader.setAttribute(
            "hx-get",
            "/offers?before=" + encodeURIComponent(last.id.replace("offer-", ""))
        );
        if (evt.detail.xhr.responseText.trim() === "") {
            loader.remove();
        } else {
            htmx.process(loader);
        }
    })
</script>

</body>
</html>
