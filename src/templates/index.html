<!DOCTYPE html>
<html>
<head>

<link id="favicon" rel="icon" type="image/x-icon" href="https://cdn.betterttv.net/emote/652a9c2ea1072c9ec8e3ef65/2x.webp">
<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx-ext-ws@2.0.4" integrity="sha384-1RwI/nvUSrMRuNj7hX1+27J8XDdCoSLf0EjEyF69nacuWyiJYoQ/j39RT1mSnd2G" crossorigin="anonymous"></script>

<style>
    body {
        font-family: sans-serif;
        max-width: 800px;
        margin: auto;
    }

    .offer {
        border: 1px solid #ccc;
        border-radius: 10px;
        margin: 15px;
        max-height: 250px;
        transition: transform 0.2s;
    }

    .offer > a {
        display: flex;
        justify-content: space-between;
        text-decoration: none;
        color: inherit;
    }

    .offer img {
        max-width: 300px;
        border-radius: 0 10px 10px 0;
    }

    .offer:hover {
        transform: scale(1.01);
    }

    .offer-divider {
        margin: 15px;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 0.9em;
        color: #888;
    }
    
    .offer-divider::before, .offer-divider::after {
        content: "";
        flex: 1;
        border-bottom: 2px dotted #888;
    }

    #new-divider::before, #new-divider::after {
        border-bottom: 3px dashed #bd2150;
    }

    #new-divider {
        color: #bd2150;
        font-weight: 500;
    }

    #scroll-loader {
        height: 1px;
    }
</style>

</head>

<body>

<div hx-ext="ws" ws-connect="/ws">
    <div id="offers">
        {% for offer in offers %}
        {% include "offer.html" %}
        {% endfor %}
    </div>
</div>

<div
    id="scroll-loader"
    hx-get="/offers?before={{offers[-1].link|urlencode}}"
    hx-trigger="intersect">
</div>

<script>
    const GROUP_INTERVAL = 5000;
    const offers = document.getElementById("offers");
    let updateTimestamp = Date.now();
    let lastOffer = null;
    
    document.body.addEventListener("htmx:wsBeforeMessage", (evt) => {
        lastOffer = offers.children[0];
    });

    document.body.addEventListener("htmx:wsAfterMessage", (evt) => {
        if (Date.now() - updateTimestamp > GROUP_INTERVAL) {
            if (lastOffer === offers.children[0]) {
                return;
            }

            updateTimestamp = Date.now();
            const newDivider = document.getElementById("new-divider");
            if (newDivider) {
                newDivider.id = "";
            }
            lastOffer.insertAdjacentHTML(
                "beforebegin", 
                `<div id="new-divider" class="offer-divider">${new Date().toLocaleTimeString([], { hour12: false })}</div>`
            );
        }
    });

    document.body.addEventListener("htmx:afterSwap", (evt) => {
        const offers = document.querySelectorAll(".offer");
        if (offers.length === 0)
            return;
        const last = offers[offers.length - 1];
        const loader = document.getElementById("scroll-loader");
        loader.setAttribute(
            "hx-get",
            "/offers?before=" + encodeURIComponent(last.id.replace("offer-", ""))
        );
        if (evt.detail.xhr.responseText.trim() === "") {
            loader.remove();
        } else {
            htmx.process(loader);
        }

        document.querySelectorAll(".offer-divider").forEach(div => div.remove());
        generateDividers();
    });

    document.addEventListener("DOMContentLoaded", generateDividers);

    function generateDividers() {
        const offers = document.querySelectorAll(".offer");
        let lastBatchTime = new Date(offers[0].getAttribute("timestamp"));
        for (const offer of offers) {
            const timestamp = new Date(offer.getAttribute("timestamp"));
            if (lastBatchTime - timestamp.getTime() > GROUP_INTERVAL) {
                offer.insertAdjacentHTML(
                    "beforebegin", 
                    `<div class="offer-divider">${new Date(lastBatchTime).toLocaleTimeString([], { hour12: false })}</div>`
                );
                lastBatchTime = timestamp.getTime();
            }
        } 
    }
</script>

</body>
</html>
